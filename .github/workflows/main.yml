name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Maven
        run: sudo apt-get update && sudo apt-get install -y maven

      - name: Build project
        run: mvn clean install -DskipTests
