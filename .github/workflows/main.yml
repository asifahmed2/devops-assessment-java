name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build using Maven Wrapper
        run: |
          cd devops-assessment-java
          chmod +x mvnw
          ./mvnw clean install -DskipTests
